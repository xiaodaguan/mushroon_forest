<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>蘑菇小森林 🍄</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
canvas{display:block;width:100%!important;height:100%!important;touch-action:none}
.hidden{display:none!important}
#menuUI{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10}
#menuUI>*{pointer-events:auto}
.mbtn{background:linear-gradient(180deg,#ffb347,#ff8c00);border:none;border-radius:100px;padding:0 36px;height:56px;font-size:22px;font-weight:bold;color:#fff;cursor:pointer;box-shadow:0 6px 30px rgba(255,140,0,.4);transition:transform .12s;display:flex;align-items:center;gap:10px;margin:8px}
.mbtn:active{transform:scale(.94)}
.mbtn-locked{background:linear-gradient(180deg,#b0b0b0,#888);box-shadow:0 6px 20px rgba(0,0,0,.2);cursor:not-allowed}
.mbtn-green{background:linear-gradient(180deg,#55efc4,#00b894);box-shadow:0 6px 30px rgba(0,184,148,.4)}
.mbtn-blue{background:linear-gradient(180deg,#74b9ff,#0984e3);box-shadow:0 6px 30px rgba(9,132,227,.4)}
#popup{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);pointer-events:auto;z-index:20}
.popup-card{background:linear-gradient(180deg,#fff9e6,#fff3cc);border-radius:26px;padding:20px 30px;text-align:center;box-shadow:0 12px 60px rgba(0,0,0,.5);max-width:80%;border:4px solid #fdcb6e;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.popup-card .chinese-char{font-size:52px;font-weight:bold;color:#d63031;display:block;margin:4px 0}
.popup-card .pinyin{font-size:22px;color:#636e72;margin:2px 0}
.popup-card .meaning{font-size:15px;color:#636e72;margin:4px 0 10px;line-height:1.4}
.popup-card .close-btn{background:linear-gradient(180deg,#fd79a8,#e84393);border:none;border-radius:50px;padding:8px 24px;font-size:16px;color:#fff;font-weight:bold;cursor:pointer}
#hud{position:absolute;top:10px;left:14px;right:14px;display:flex;justify-content:space-between;pointer-events:none;z-index:5;align-items:center}
#hud .btn-back{pointer-events:auto;background:rgba(0,0,0,.4);border:none;border-radius:14px;padding:4px 14px;font-size:13px;color:#fff;cursor:pointer;backdrop-filter:blur(6px)}
#hud .hud-info{color:#fff;font-size:13px;text-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;gap:14px}
#hud .hud-info span{background:rgba(0,0,0,.3);padding:3px 10px;border-radius:10px;backdrop-filter:blur(4px)}
#albumUI{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto}
.album-book{background:linear-gradient(180deg,#ffeaa7,#fdcb6e);border-radius:20px;padding:18px;width:92%;max-width:620px;max-height:85%;display:flex;flex-direction:column;box-shadow:0 12px 60px rgba(0,0,0,.4);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.album-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 10px}
.album-header h2{font-size:20px;color:#6c5ce7}
.album-close{background:none;border:2px solid #6c5ce7;border-radius:50%;width:32px;height:32px;font-size:16px;color:#6c5ce7;cursor:pointer}
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;overflow-y:auto;padding:4px;max-height:55vh}
.album-item{background:rgba(255,255,255,.5);border-radius:10px;padding:6px 4px;text-align:center;transition:transform .12s;cursor:pointer}
.album-item .char{font-size:22px;font-weight:bold;color:#2d3436;display:block}
.album-item .sub{font-size:11px;color:#636e72}
.album-item.locked{filter:grayscale(1);opacity:.4}
.album-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 0}
.album-footer span{font-size:14px;color:#636e72}
#toast{position:absolute;top:18%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 24px;border-radius:30px;font-size:15px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:30;white-space:nowrap}
@media(max-width:500px){
  .mbtn{height:48px;font-size:18px;padding:0 18px;margin:6px}
  .popup-card .chinese-char{font-size:38px}
}
</style>
</head>
<body>
<div id="app">
  <div id="hud" class="hidden">
    <button class="btn-back" onclick="game.goMenu()">← 回去</button>
    <div class="hud-info"><span>🌲 蘑菇森林</span><span id="hudStars">⭐ 0</span></div>
  </div>
  <div id="menuUI">
    <div style="text-align:center;background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:26px;padding:24px 20px">
      <div style="font-size:48px;margin-bottom:2px">🍄</div>
      <div style="font-size:28px;font-weight:bold;color:#fff;margin-bottom:16px;text-shadow:0 2px 12px rgba(0,0,0,.3)">蘑菇小森林</div>
      <button class="mbtn mbtn-green" onclick="game.enterForest()">🌲 采蘑菇</button>
      <button class="mbtn mbtn-locked" onclick="game.toast('🛡️ 即将开放')">🛡️ 蘑菇保卫战 🔒</button>
      <button class="mbtn mbtn-blue mbtn-small" onclick="game.openAlbum()">📖 蘑菇图鉴</button>
    </div>
  </div>
  <div id="popup" class="hidden">
    <div class="popup-card">
      <div style="font-size:64px" id="popIcon">🍄</div>
      <span class="chinese-char" id="popChar">红</span>
      <span class="pinyin" id="popPinyin">hóng</span>
      <div class="meaning" id="popMeaning">红菇</div>
      <button class="close-btn" onclick="game.closePopup()">知道啦 ✨</button>
    </div>
  </div>
  <div id="albumUI" class="hidden">
    <div class="album-book">
      <div class="album-header">
        <h2>📖 蘑菇图鉴</h2>
        <button class="album-close" onclick="game.closeAlbum()">✕</button>
      </div>
      <div class="album-grid" id="albumGrid"></div>
      <div class="album-footer">
        <span>⭐ <span id="albumStars">0</span></span>
        <button class="mbtn mbtn-pink mbtn-small" style="margin:0;font-size:13px;padding:0 14px;height:32px" onclick="game.closeAlbum()">← 回去</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script type="module">
// ================================================================
//  🍄 蘑菇小森林 — Three.js 3D 版
// ================================================================
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── Renderers ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('app').append(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.getElementById('app').append(labelRenderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(3, 5, 7);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.4;
controls.minPolarAngle = Math.PI / 6;
controls.minDistance = 8;
controls.maxDistance = 40;
controls.update();

// ── Lights ──
const ambient = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.6);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffeedd, 1.8);
sun.position.set(20, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
fill.position.set(-15, 10, -10);
scene.add(fill);

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color:0x5a9e5a, roughness:0.9, metalness:0 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Ground detail: grass patches
for (let i=0;i<200;i++) {
  const blade = new THREE.Mesh(
    new THREE.PlaneGeometry(0.04, 0.1+Math.random()*0.15),
    new THREE.MeshBasicMaterial({ color:[0x4a8e4a,0x6aae6a,0x3a7d3a][randi(0,2)], side:THREE.DoubleSide, transparent:true, opacity:0.5 })
  );
  const a = rand(0, Math.PI*2), r = rand(1, 27);
  blade.position.set(r*Math.cos(a), 0.05, r*Math.sin(a));
  blade.rotation.set(rand(-0.3,0.3), rand(0,Math.PI*2), rand(-0.3,0.3));
  scene.add(blade);
}

// ── Trees ──
function makeTree(x, z, scale) {
  const g = new THREE.Group();
  const s = scale || 1;
  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15*s, 0.25*s, 1.8*s, 6),
    new THREE.MeshStandardMaterial({ color:0x6B4F3A, roughness:0.8 })
  );
  trunk.position.y = 0.9*s;
  trunk.castShadow = true;
  g.add(trunk);
  // Foliage (3 layers)
  const fc = [0x5aB04c, 0x4aA03c, 0x6aC05c][randi(0,2)];
  for (let i=0;i<3;i++) {
    const r = (1.2 - i*0.3)*s;
    const f = new THREE.Mesh(
      new THREE.SphereGeometry(r, 7, 6),
      new THREE.MeshStandardMaterial({ color:fc, roughness:0.7 })
    );
    f.position.set(rand(-0.2,0.2)*s, 1.4*s + i*0.7*s, rand(-0.2,0.2)*s);
    f.scale.y = 0.7;
    f.castShadow = true;
    g.add(f);
  }
  g.position.set(x, 0, z);
  return g;
}

const treePositions = [];
for (let i=0;i<45;i++) {
  const a = rand(0, Math.PI*2), r = rand(3, 26);
  treePositions.push([r*Math.cos(a), r*Math.sin(a), 0.8+rand(0,0.4)]);
}
for (const [tx,tz,ts] of treePositions) scene.add(makeTree(tx, tz, ts));

// ── Water ──
function makeWater(x, z, r) {
  const water = new THREE.Mesh(
    new THREE.CircleGeometry(r, 24),
    new THREE.MeshStandardMaterial({ color:0x4a8abe, roughness:0.1, metalness:0.3, transparent:true, opacity:0.5 })
  );
  water.rotation.x = -Math.PI/2;
  water.position.set(x, 0.02, z);
  scene.add(water);
}
makeWater(8, 6, 3);
makeWater(-10, -8, 2.5);
makeWater(-5, 12, 2);

// ── Flowers ──
function makeFlower(x, z, color) {
  const g = new THREE.Group();
  const col = new THREE.MeshStandardMaterial({ color, roughness:0.6 });
  for (let i=0;i<5;i++) {
    const a = i/5*Math.PI*2;
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), col);
    p.position.set(Math.cos(a)*0.15, 0.08, Math.sin(a)*0.15);
    g.add(p);
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshStandardMaterial({ color:0xfdcb6e }));
  g.position.set(x, 0.3, z);
  g.add(center);
  scene.add(g);
}
for (let i=0;i<30;i++) {
  const a = rand(0, Math.PI*2), r = rand(2, 25);
  makeFlower(r*Math.cos(a), r*Math.sin(a), ['#fd79a8','#fdcb6e','#74b9ff','#e84393'][randi(0,3)]);
}

// ── Rocks ──
function makeRock(x, z, s) {
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(s*0.4),
    new THREE.MeshStandardMaterial({ color:0x888888, roughness:0.9 })
  );
  rock.position.set(x, s*0.3, z);
  rock.scale.set(1, 0.6, 0.8+rand(0,0.3));
  rock.rotation.set(rand(0,Math.PI), rand(0,Math.PI), 0);
  rock.castShadow = true;
  rock.receiveShadow = true;
  scene.add(rock);
  return rock;
}
for (let i=0;i<12;i++) {
  const a = rand(0, Math.PI*2), r = rand(3, 24);
  makeRock(r*Math.cos(a), r*Math.sin(a), 0.3+rand(0,0.3));
}

// ================================================================
//  MUSHROOM 3D BUILDERS — 12 real species
// ================================================================
const mushrooms = [];
const mushroomData = [];

function rgb(hex){return new THREE.Color(hex)}

// 1. Russula (红菇) — red dome + white dots + white stem
function buildRussula() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.8, 8),
    new THREE.MeshStandardMaterial({ color:0xf5e6d3, roughness:0.7 }));
  stem.position.y = 0.4;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 10),
    new THREE.MeshStandardMaterial({ color:0xe74c3c, roughness:0.5 }));
  cap.scale.set(1, 0.5, 1);
  cap.position.y = 0.9;
  cap.castShadow = true;
  g.add(cap);
  // White dots
  const dotMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.3 });
  for (const [dx,dz] of [[0.3,0.2],[-0.25,0.3],[0.1,-0.3],[-0.15,-0.15],[0.35,-0.1],[-0.35,0.1],[0,0.35]]) {
    const d = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), dotMat);
    d.position.set(dx, 1.0, dz);
    g.add(d);
  }
  return g;
}

// 2. Shiitake (香菇) — brown cap, cracked
function buildShiitake() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.5, 8),
    new THREE.MeshStandardMaterial({ color:0xe8ddd0, roughness:0.7 }));
  stem.position.y = 0.25;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.55, 12, 10),
    new THREE.MeshStandardMaterial({ color:0x8B6B4E, roughness:0.8 }));
  cap.scale.set(1, 0.35, 1);
  cap.position.y = 0.6;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 3. Enoki (金针菇) — cluster of thin white
function buildEnoki() {
  const g = new THREE.Group();
  const stemMat = new THREE.MeshStandardMaterial({ color:0xfaf3eb, roughness:0.5 });
  const capMat = new THREE.MeshStandardMaterial({ color:0xf0e8d0, roughness:0.5 });
  for (let i=0;i<7;i++) {
    const ox = (i-3)*0.12, oz = Math.sin(i*2.3)*0.08;
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.6, 5), stemMat);
    stem.position.set(ox, 0.3+oz*0.3, oz);
    g.add(stem);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.05, 5, 5), capMat);
    cap.position.set(ox, 0.65+oz*0.3, oz);
    g.add(cap);
  }
  return g;
}

// 4. King Oyster (杏鲍菇) — thick stem, small cap
function buildKingOyster() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 1.0, 10),
    new THREE.MeshStandardMaterial({ color:0xf5f0ea, roughness:0.6 }));
  stem.position.y = 0.5;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 8),
    new THREE.MeshStandardMaterial({ color:0xc9a87c, roughness:0.6 }));
  cap.scale.set(1, 0.4, 1);
  cap.position.y = 1.05;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 5. Reishi (灵芝) — red fan
function buildReishi() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.4, 6),
    new THREE.MeshStandardMaterial({ color:0x8b6b4e, roughness:0.7 }));
  stem.position.set(-0.1, 0.2, 0);
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.5, 10, 8),
    new THREE.MeshStandardMaterial({ color:0xb83b2a, roughness:0.3, metalness:0.1 }));
  cap.scale.set(1.2, 0.25, 0.7);
  cap.position.set(0.2, 0.5, 0);
  cap.rotation.z = -0.15;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 6. Bamboo Fungus (竹荪)
function buildBamboo() {
  const g = new THREE.Group();
  const stemMat = new THREE.MeshStandardMaterial({ color:0xf0ebe0, roughness:0.5 });
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 1.2, 6), stemMat);
  stem.position.y = 0.6;
  g.add(stem);
  // Skirt ring
  const skirt = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.3, 12),
    new THREE.MeshBasicMaterial({ color:0xf0ebe0, transparent:true, opacity:0.3, side:THREE.DoubleSide }));
  skirt.position.y = 0.6;
  skirt.rotation.x = -Math.PI/2;
  g.add(skirt);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6),
    new THREE.MeshStandardMaterial({ color:0xd4e6b5, roughness:0.5 }));
  cap.position.y = 1.2;
  g.add(cap);
  return g;
}

// 7. Chanterelle (鸡油菌) — funnel shaped
function buildChanterelle() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.5, 8),
    new THREE.MeshStandardMaterial({ color:0xf0d080, roughness:0.6 }));
  stem.position.y = 0.25;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.55, 0.2, 10),
    new THREE.MeshStandardMaterial({ color:0xe8c040, roughness:0.5 }));
  cap.position.y = 0.6;
  cap.castShadow = true;
  g.add(cap);
  // Funnel top
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.4, 0.15, 10),
    new THREE.MeshStandardMaterial({ color:0xd4a830, roughness:0.5 }));
  top.position.y = 0.7;
  g.add(top);
  return g;
}

// 8. Bolete (牛肝菌) — thick brown
function buildBolete() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.7, 10),
    new THREE.MeshStandardMaterial({ color:0xd4c8b0, roughness:0.7 }));
  stem.position.y = 0.35;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 10),
    new THREE.MeshStandardMaterial({ color:0x8B6B4E, roughness:0.7 }));
  cap.scale.set(1, 0.55, 1);
  cap.position.y = 0.85;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 9. Matsutake (松茸) — thick white stem with ring
function buildMatsutake() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 1.0, 8),
    new THREE.MeshStandardMaterial({ color:0xf0e8d0, roughness:0.5 }));
  stem.position.y = 0.5;
  g.add(stem);
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.22, 0.35, 8),
    new THREE.MeshBasicMaterial({ color:0xe8ddc0, side:THREE.DoubleSide }));
  ring.position.y = 0.65;
  ring.rotation.x = -Math.PI/2;
  g.add(ring);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.5, 10, 8),
    new THREE.MeshStandardMaterial({ color:0xa08060, roughness:0.6 }));
  cap.scale.set(1, 0.5, 1);
  cap.position.y = 1.05;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 10. Morel (羊肚菌) — honeycomb
function buildMorel() {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.6, 8),
    new THREE.MeshStandardMaterial({ color:0xe8ddd0, roughness:0.7 }));
  stem.position.y = 0.3;
  g.add(stem);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 0.5, 10),
    new THREE.MeshStandardMaterial({ color:0x8B6B4E, roughness:0.9 }));
  cap.position.y = 0.85;
  cap.castShadow = true;
  g.add(cap);
  return g;
}

// 11. Puffball (马勃菌) — round ball
function buildPuffball() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 10, 10),
    new THREE.MeshStandardMaterial({ color:0xf0ebe0, roughness:0.6 }));
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);
  return g;
}

// 12. Coral Fungus (珊瑚菌) — branching
function buildCoral() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0xff8c69, roughness:0.5 });
  for (let i=0;i<8;i++) {
    const a = i/8*Math.PI*2, r = 0.15+Math.random()*0.15;
    const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, r, 5), mat);
    branch.position.set(Math.cos(a)*0.1, r/2, Math.sin(a)*0.1);
    branch.rotation.z = Math.cos(a)*0.3;
    branch.rotation.x = Math.sin(a)*0.3;
    g.add(branch);
  }
  return g;
}

// ================================================================
//  PLACE MUSHROOMS & OBJECTS
// ================================================================
const worldObjects = [];
let butterflies3D = [];

function placeMushrooms() {
  // Clear old
  for (const o of worldObjects) if (o.group) scene.remove(o.group);
  worldObjects.length = 0;

  for (const sp of SPECIES) {
    const count = randi(sp.min, sp.max);
    for (let i=0;i<count;i++) {
      const a = rand(0, Math.PI*2), r = rand(2, 22);
      const x = r*Math.cos(a), z = r*Math.sin(a);
      const group = sp.build();
      group.position.set(x, 0, z);
      const scale = 0.8 + rand(0,0.4);
      group.scale.set(scale, scale, scale);
      group.rotation.y = rand(0, Math.PI*2);
      scene.add(group);
      
      // Label
      const div = document.createElement('div');
      div.textContent = '🍄';
      div.style.fontSize = '20px';
      div.style.textShadow = '0 2px 6px rgba(0,0,0,0.3)';
      const label = new CSS2DObject(div);
      label.position.set(x, 1.2*scale+0.3, z);
      scene.add(label);

      worldObjects.push({
        type:'mushroom', species:sp, mesh:group, label,
        x, z, collected:Save.isCollected(sp.id), scale,
        data:sp
      });
    }
  }

  // Butterflies (3D)
  for (const b of butterflies3D) scene.remove(b);
  butterflies3D = [];
  const bMat = new THREE.MeshBasicMaterial({ color:0xfd79a8, side:THREE.DoubleSide });
  for (let i=0;i<5;i++) {
    const wing = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.2), bMat);
    wing.position.set(rand(-20,20), rand(1,3), rand(-20,20));
    wing.userData = { phase:rand(0,Math.PI*2), vx:rand(-0.005,0.005), vy:rand(-0.005,0.005), origY:wing.position.y };
    scene.add(wing);
    butterflies3D.push(wing);
  }
}

// ================================================================
//  CHARACTER
// ================================================================
let charGroup = null;
const player = { x:0, z:0, targetX:0, targetZ:0, moving:false, pendingCollect:null };
function makeCharacter() {
  const g = new THREE.Group();
  const skin = new THREE.MeshStandardMaterial({ color:0xffd5b8, roughness:0.4 });
  const shirt = new THREE.MeshStandardMaterial({ color:0x4a9eff, roughness:0.6 });
  const pants = new THREE.MeshStandardMaterial({ color:0x3d5a80, roughness:0.6 });
  const shoes = new THREE.MeshStandardMaterial({ color:0x6B4F3A, roughness:0.8 });
  const hatMat = new THREE.MeshStandardMaterial({ color:0xe67e22, roughness:0.5 });
  const hatDot = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.3 });
  const eyeW = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.1 });
  const eyeP = new THREE.MeshStandardMaterial({ color:0x2d3436, roughness:0.1 });
  const blush = new THREE.MeshStandardMaterial({ color:0xff9e9e, roughness:0.5, transparent:true, opacity:0.3 });

  // --- Body (chubby toddler proportions) ---
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.4, 0.5, 12), shirt);
  body.position.y = 0.5;
  g.add(body);

  // --- Head (big, round) ---
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 14, 12), skin);
  head.position.y = 0.95;
  g.add(head);

  // --- Hair / Mushroom Hat ---
  // Cap
  const hat = new THREE.Mesh(new THREE.SphereGeometry(0.42, 14, 12), hatMat);
  hat.scale.set(1, 0.45, 1);
  hat.position.set(0, 1.15, 0);
  g.add(hat);
  // Hat rim
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.06, 8, 16), hatMat);
  rim.position.set(0, 0.98, 0);
  rim.rotation.x = Math.PI / 2;
  g.add(rim);
  // White dots on hat
  for (const [dx,dz] of [[0.18,0.12],[-0.14,0.2],[0.08,-0.18],[-0.2,-0.08],[0.25,-0.06],[-0.08,0.06]]) {
    const d = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), hatDot);
    d.position.set(dx, 1.08, dz);
    g.add(d);
  }

  // --- Eyes (big, cute) ---
  const eyeSpacing = 0.13;
  for (const side of [-1, 1]) {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), eyeW);
    white.position.set(side * eyeSpacing, 0.98, 0.28);
    g.add(white);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), eyeP);
    pupil.position.set(side * eyeSpacing + side*0.015, 0.975, 0.33);
    g.add(pupil);
    // Eye shine
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.02, 6, 6), new THREE.MeshBasicMaterial({ color:0xffffff }));
    shine.position.set(side * eyeSpacing + side*0.03, 0.99, 0.34);
    g.add(shine);
  }

  // --- Blush ---
  for (const side of [-1, 1]) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.045, 6, 6), blush);
    b.position.set(side * 0.2, 0.9, 0.25);
    g.add(b);
  }

  // --- Mouth (smile) ---
  const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.045, 0.015, 6, 10), new THREE.MeshBasicMaterial({ color:0xd46565 }));
  mouth.position.set(0, 0.9, 0.3);
  mouth.rotation.x = Math.PI * 0.15;
  mouth.rotation.z = Math.PI;
  g.add(mouth);

  // --- Arms ---
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.35, 6), skin);
    arm.position.set(side * 0.38, 0.55, 0);
    arm.rotation.z = side * 0.3;
    g.add(arm);
  }

  // --- Legs & Shoes ---
  for (const side of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.3, 6), pants);
    leg.position.set(side * 0.12, 0.18, 0);
    g.add(leg);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.2), shoes);
    shoe.position.set(side * 0.12, 0.03, 0.03);
    shoe.rotation.y = side < 0 ? 0.1 : -0.1;
    g.add(shoe);
  }

  return g;
}

// ================================================================
//  GAME
// ================================================================
let gameState = 'menu';
let loadingDone = false;

const Save={_d:null,
load(){try{const r=localStorage.getItem('mf6');if(r){this._d=JSON.parse(r);return}}catch(e){}this._d={stars:0,collected:{}}},
save(){try{localStorage.setItem('mf6',JSON.stringify(this._d))}catch(e){}},
get stars(){return this._d.stars},set stars(v){this._d.stars=v;this.save()},
isCollected(id){return!!this._d.collected[id]},
collect(id){if(this._d.collected[id])return false;this._d.collected[id]=true;this._d.stars=Object.keys(this._d.collected).length;this.save();return true},
totalCollected(){return Object.keys(this._d.collected).length}};
Save.load();

const game = {
  showingPopup: false,

  enterForest() {
    if (!loadingDone) return;
    gameState = 'forest';
    placeMushrooms();
    if (!charGroup) { charGroup = makeCharacter(); scene.add(charGroup); }
    player.x = 0; player.z = 0; player.targetX = 0; player.targetZ = 0; player.moving = false; player.pendingCollect = null;
    charGroup.position.set(0, 0, 0);
    charGroup.rotation.y = 0;
    controls.target.set(0, 0, 0);
    camera.position.set(3, 5, 7);
    controls.update();
    document.getElementById('menuUI').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    updateHUD();
  },

  goMenu() {
    gameState = 'menu';
    document.getElementById('menuUI').classList.remove('hidden');
    document.getElementById('hud').classList.add('hidden');
  },

  openAlbum() {
    this.renderAlbum();
    document.getElementById('albumUI').classList.remove('hidden');
  },
  closeAlbum() { document.getElementById('albumUI').classList.add('hidden'); },

  renderAlbum() {
    const grid=document.getElementById('albumGrid');
    const coll=SPECIES.filter(s=>Save.isCollected(s.id)).length;
    document.getElementById('albumStars').textContent=coll+'/'+SPECIES.length;
    grid.innerHTML='';
    for (const sp of SPECIES) {
      const has=Save.isCollected(sp.id);
      const div=document.createElement('div');
      div.className='album-item'+(has?'':' locked');
      div.innerHTML=`<div class="char">${has?sp.char:'?'}</div><div class="sub">${has?sp.name:'???'}</div>`;
      if (has) div.onclick=()=>{this.showPopup(sp)};
      grid.appendChild(div);
    }
  },

  showPopup(data) {
    this.showingPopup=true;
    document.getElementById('popIcon').textContent='🍄';
    document.getElementById('popChar').textContent=data.char;
    document.getElementById('popPinyin').textContent=data.pinyin;
    document.getElementById('popMeaning').textContent=data.name+' — '+data.desc;
    document.getElementById('popup').classList.remove('hidden');
  },
  closePopup(){this.showingPopup=false;document.getElementById('popup').classList.add('hidden')},

  toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>{el.style.opacity='0'},1500)}
};

function updateHUD() {
  document.getElementById('hudStars').textContent='⭐ '+Save.stars;
}

// ── Interaction ──
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let isDragging = false;
let dragStart = { x:0, y:0 };

renderer.domElement.addEventListener('pointerdown', e => {
  if (gameState !== 'forest' || game.showingPopup) return;
  isDragging = true;
  dragStart.x = e.clientX; dragStart.y = e.clientY;
});

renderer.domElement.addEventListener('pointermove', e => {
  if (!isDragging || gameState !== 'forest') return;
  const dx = e.clientX - dragStart.x;
  if (Math.abs(dx) > 5) isDragging = false; // will become orbit
});

renderer.domElement.addEventListener('pointerup', e => {
  if (!isDragging || gameState !== 'forest') return;
  isDragging = false;
  
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  
  // Check mushrooms
  const mushroomMeshes = [];
  for (const obj of worldObjects) {
    if (obj.type === 'mushroom' && !obj.collected) {
      obj.mesh.children.forEach(child => mushroomMeshes.push(child));
    }
  }
  const intersects = raycaster.intersectObjects(mushroomMeshes);
  if (intersects.length > 0) {
    // Walk to mushroom then collect
    for (const obj of worldObjects) {
      if (obj.type === 'mushroom' && !obj.collected) {
        for (const child of obj.mesh.children) {
          if (intersects[0].object === child) {
            player.targetX = obj.x + (obj.x > player.x ? -0.8 : 0.8);
            player.targetZ = obj.z + (obj.z > player.z ? -0.8 : 0.8);
            player.moving = true;
            player.pendingCollect = obj;
            return;
          }
        }
      }
    }
  }
  
  // Move character to click point
  const groundIntersect = raycaster.intersectObject(ground);
  if (groundIntersect && groundIntersect.length > 0 && charGroup) {
    const p = groundIntersect[0].point;
    player.targetX = p.x;
    player.targetZ = p.z;
    player.moving = true;
  }
});

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation ──
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  
  // Animate butterflies
  for (const b of butterflies3D) {
    b.userData.phase += dt;
    b.position.y = b.userData.origY + Math.sin(b.userData.phase) * 0.3;
    b.position.x += Math.sin(b.userData.phase * 0.5) * 0.002;
    b.position.z += Math.cos(b.userData.phase * 0.7) * 0.002;
    b.rotation.y = Math.sin(b.userData.phase * 0.3);
  }
  
  // Smooth character movement
  if (player.moving && charGroup) {
    const dx = player.targetX - player.x;
    const dz = player.targetZ - player.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 0.05) {
      const speed = Math.min(dist * 0.06 + 0.01, 0.1);
      player.x += (dx/dist) * speed;
      player.z += (dz/dist) * speed;
      charGroup.position.x = player.x;
      charGroup.position.z = player.z;
      // Face movement direction
      charGroup.rotation.y = Math.atan2(dx, dz);
    } else {
      player.x = player.targetX;
      player.z = player.targetZ;
      charGroup.position.x = player.x;
      charGroup.position.z = player.z;
      player.moving = false;
      // Collect pending mushroom
      if (player.pendingCollect) {
        const obj = player.pendingCollect;
        player.pendingCollect = null;
        const isNew = Save.collect(obj.species.id);
        obj.collected = true;
        if (obj.label) obj.label.element.style.opacity = '0';
        obj.mesh.visible = false;
        if (isNew) setTimeout(() => game.showPopup(obj.species), 300);
        updateHUD();
      }
    }
  }
  
  // Camera follows character (smooth)
  if (charGroup) {
    controls.target.x += (player.x - controls.target.x) * 0.06;
    controls.target.z += (player.z - controls.target.z) * 0.06;
  }
  
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ── Start ──
loadingDone = true;
game.enterForest(); // Auto-enter
animate();

function rand(m,M){return Math.random()*(M-m)+m}
function randi(m,M){return Math.floor(rand(m,M+1))}

console.log('🍄 3D Mushroom Forest loaded!');
console.log('🏗️', SPECIES.length, 'mushroom species');

// Expose for HTML onclick
window.game = game;
</script>
